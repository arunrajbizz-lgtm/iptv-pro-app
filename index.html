<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>IPTV Pro App</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="sidebar">
      <h2>IPTV Pro</h2>
      <textarea id="m3uInput" placeholder="Paste M3U URL here"></textarea>
      <button id="loadBtn">Load Playlist</button>
      <div id="channels"></div>
    </div>
    <div class="player">
      <video id="video" controls autoplay></video>
      <div id="status">Ready</div>
    </div>
  </div>
  <script type="module" src="./index.js"></script>
</body>
</html>
